name: Daily NBA Stats Refresh

# Runs automatically at two times daily (UTC):
#   12:00 UTC = 7:00 AM ET — after the 5 AM Vercel block; pulls fresh defense stats
#               then re-enriches with updated DVP/pace data
#   16:00 UTC = 11:00 AM ET — midday refresh before afternoon tip-offs

on:
  schedule:
    - cron: '0 12 * * *'   # 7:00 AM ET
    - cron: '0 16 * * *'   # 11:00 AM ET
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install nba_api requests

      - name: Fetch NBA game logs + team defense stats
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/fetch_nba_stats.py

      - name: Refresh props + AI enrichment + streaks (only if app is deployed)
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
        run: |
          if [ -z "$VERCEL_APP_URL" ]; then
            echo "No VERCEL_APP_URL set — skipping remote API calls (stats saved to Supabase)"
            echo "When you're ready to deploy, add VERCEL_APP_URL to GitHub Secrets."
          else
            echo "Refreshing props at $VERCEL_APP_URL..."
            curl -s "$VERCEL_APP_URL/api/props?refresh=true" | head -c 200
            sleep 5
            echo "Running AI enrichment..."
            curl -s "$VERCEL_APP_URL/api/enrich?force=true" | head -c 200
            sleep 5
            echo "Generating streaks..."
            curl -s "$VERCEL_APP_URL/api/feed/generate/streak?force=true" | head -c 200
          fi

      - name: Done
        run: echo "NBA IQ daily refresh complete"
